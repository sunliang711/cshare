<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f1117">
  <title>CrossShare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>CrossShare</h1>
      <p class="subtitle">跨设备内容分享</p>
      <button class="icon-btn" id="settingsToggle" title="设置">⚙</button>
    </header>

    <div id="settingsPanel" class="settings hidden">
      <label>
        <span>Server URL</span>
        <input type="text" id="serverUrl" placeholder="http://localhost:10431">
      </label>
      <label>
        <span>Token (可选)</span>
        <input type="password" id="authToken" placeholder="JWT token">
      </label>
      <div class="settings-actions">
        <button class="btn btn-sm" id="saveSettings">保存</button>
        <button class="btn btn-sm btn-ghost" id="healthCheck">检查连接</button>
        <span id="healthStatus"></span>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="push">推送</button>
      <button class="tab" data-tab="pull">拉取</button>
    </nav>

    <section id="pushTab" class="tab-content active">
      <div class="mode-switch">
        <button class="mode active" data-mode="text">文本</button>
        <button class="mode" data-mode="file">文件</button>
      </div>

      <div id="textMode">
        <textarea id="pushText" placeholder="输入要分享的文本内容…" rows="6"></textarea>
      </div>

      <div id="fileMode" class="hidden">
        <div class="drop-zone" id="dropZone">
          <p>点击选择文件或拖拽到此处</p>
          <input type="file" id="fileInput">
        </div>
        <div id="fileInfo" class="file-info hidden"></div>
      </div>

      <div class="options-row">
        <label class="inline">
          <span>TTL</span>
          <input type="number" id="pushTtl" placeholder="默认" min="1">
          <span class="unit">秒</span>
        </label>
      </div>

      <button class="btn btn-primary btn-block" id="pushBtn">推送</button>

      <div id="pushResult" class="result hidden">
        <div class="result-key">
          <span id="resultKey"></span>
          <button class="btn btn-sm" id="copyKey" title="复制">复制</button>
        </div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
    </section>

    <section id="pullTab" class="tab-content">
      <div class="pull-input">
        <input type="text" id="pullKey" placeholder="输入 Key">
        <button class="btn btn-primary" id="pullBtn">拉取</button>
      </div>

      <div class="options-row">
        <label class="checkbox">
          <input type="checkbox" id="deleteAfterPull">
          <span>拉取后删除</span>
        </label>
      </div>

      <div id="pullResult" class="result hidden">
        <div id="pullTextResult" class="hidden">
          <div class="pull-text-header">
            <span class="pull-label">文本内容</span>
            <button class="btn btn-sm" id="copyText" title="复制">复制</button>
          </div>
          <pre id="pullTextContent"></pre>
        </div>
        <div id="pullFileResult" class="hidden">
          <div class="file-download">
            <span id="pullFileName"></span>
            <a id="pullFileLink" class="btn btn-sm">下载</a>
          </div>
        </div>
        <div class="result-meta" id="pullMeta"></div>
      </div>

      <div class="divider"></div>

      <div class="delete-section">
        <div class="pull-input">
          <input type="text" id="deleteKey" placeholder="输入 Key">
          <button class="btn btn-danger" id="deleteBtn">删除</button>
        </div>
        <div id="deleteResult" class="result hidden">
          <div class="result-meta" id="deleteMeta"></div>
        </div>
      </div>
    </section>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
