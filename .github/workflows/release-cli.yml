name: Release CLI

on:
  push:
    tags: ['cli/v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: crossshare-cli/go.mod

      - name: Build
        working-directory: crossshare-cli
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#cli/}
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../share-${VERSION}-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: share-${{ matrix.suffix }}
          path: share-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum share-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CLI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            share-*
            checksums.txt
