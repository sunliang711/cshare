<!doctype html>
<html lang="zh-CN" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover"
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#0f1117" id="metaThemeColor" />
		<title>CrossShare</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="container">
			<header>
				<div class="header-top">
					<div class="header-actions-left">
						<button
							class="icon-btn"
							id="langToggle"
							title="Switch to English"
						>
							EN
						</button>
					</div>
					<div class="header-center">
						<h1>CrossShare</h1>
						<p class="subtitle" data-i18n="subtitle">
							跨设备内容分享
						</p>
					</div>
					<div class="header-actions-right">
						<button
							class="icon-btn"
							id="themeToggle"
							data-i18n-title="toggleTheme"
							title="切换主题"
						>
							☀
						</button>
						<button
							class="icon-btn"
							id="settingsToggle"
							data-i18n-title="settings"
							title="设置"
						>
							⚙
						</button>
					</div>
				</div>
			</header>

			<div id="settingsPanel" class="settings hidden">
				<label>
					<span>Server URL</span>
					<input
						type="text"
						id="serverUrl"
						placeholder="http://localhost:10431"
					/>
				</label>
				<label>
					<span data-i18n="tokenLabel">Token (可选)</span>
					<input
						type="password"
						id="authToken"
						placeholder="JWT token"
					/>
				</label>
				<div class="settings-actions">
					<button
						class="btn btn-sm"
						id="saveSettings"
						data-i18n="save"
					>
						保存
					</button>
					<button
						class="btn btn-sm btn-ghost"
						id="healthCheck"
						data-i18n="checkConn"
					>
						检查连接
					</button>
					<span id="healthStatus"></span>
				</div>
			</div>

			<nav class="tabs">
				<button class="tab active" data-tab="push" data-i18n="push">
					推送
				</button>
				<button class="tab" data-tab="pull" data-i18n="pull">
					拉取
				</button>
			</nav>

			<section id="pushTab" class="tab-content active">
				<div class="mode-switch">
					<button
						class="mode active"
						data-mode="text"
						data-i18n="text"
					>
						文本
					</button>
					<button class="mode" data-mode="file" data-i18n="file">
						文件
					</button>
				</div>

				<div id="textMode">
					<textarea
						id="pushText"
						data-i18n-placeholder="pushPlaceholder"
						placeholder="输入要分享的文本内容…"
						rows="6"
					></textarea>
				</div>

				<div id="fileMode" class="hidden">
					<div class="drop-zone" id="dropZone">
						<p data-i18n="dropHint">点击选择文件或拖拽到此处</p>
						<input type="file" id="fileInput" />
					</div>
					<div id="fileInfo" class="file-info hidden"></div>
				</div>

				<div class="options-row">
					<label class="inline">
						<span>TTL</span>
						<input
							type="number"
							id="pushTtl"
							data-i18n-placeholder="defaultPlaceholder"
							placeholder="默认"
							min="1"
						/>
						<span class="unit" data-i18n="seconds">秒</span>
					</label>
				</div>

				<button
					class="btn btn-primary btn-block"
					id="pushBtn"
					data-i18n="push"
				>
					推送
				</button>

				<div id="pushResult" class="result hidden">
					<div class="result-key">
						<span id="resultKey"></span>
						<div class="result-key-actions">
							<button
								class="btn btn-sm"
								id="copyKey"
								data-i18n="copy"
							>
								复制
							</button>
							<button
								class="btn btn-sm"
								id="copyLink"
								data-i18n="copyLink"
							>
								复制链接
							</button>
						</div>
					</div>
					<div class="result-meta" id="resultMeta"></div>
				</div>
			</section>

			<section id="pullTab" class="tab-content">
				<div class="pull-input">
					<input
						type="text"
						id="pullKey"
						data-i18n-placeholder="enterKey"
						placeholder="输入 Key"
					/>
					<button
						class="btn btn-primary"
						id="pullBtn"
						data-i18n="pull"
					>
						拉取
					</button>
				</div>

				<div class="options-row">
					<label class="checkbox">
						<input type="checkbox" id="deleteAfterPull" />
						<span data-i18n="deleteAfterPull">拉取后删除</span>
					</label>
				</div>

				<div id="pullResult" class="result hidden">
					<div id="pullTextResult" class="hidden">
						<div class="pull-text-header">
							<span class="pull-label" data-i18n="textContent"
								>文本内容</span
							>
							<button
								class="btn btn-sm"
								id="copyText"
								data-i18n="copy"
							>
								复制
							</button>
						</div>
						<pre id="pullTextContent"></pre>
					</div>
					<div id="pullFileResult" class="hidden">
						<div class="file-download">
							<span id="pullFileName"></span>
							<a
								id="pullFileLink"
								class="btn btn-sm"
								data-i18n="download"
								>下载</a
							>
						</div>
					</div>
					<div class="result-meta" id="pullMeta"></div>
				</div>

				<div class="divider"></div>

				<div class="delete-section">
					<div class="pull-input">
						<input
							type="text"
							id="deleteKey"
							data-i18n-placeholder="enterKey"
							placeholder="输入 Key"
						/>
						<button
							class="btn btn-danger"
							id="deleteBtn"
							data-i18n="delete"
						>
							删除
						</button>
					</div>
					<div id="deleteResult" class="result hidden">
						<div class="result-meta" id="deleteMeta"></div>
					</div>
				</div>
			</section>

			<div id="toast" class="toast hidden"></div>
		</div>

		<script src="app.js"></script>
	</body>
</html>
