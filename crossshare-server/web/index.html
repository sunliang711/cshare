<!doctype html>
<html lang="zh-CN" data-theme="light">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover"
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#f7f8fb" id="metaThemeColor" />
		<title>CrossShare</title>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="app-shell">
			<header class="app-header">
				<a class="brand" href="/" aria-label="CrossShare">
					<img src="/favicon.svg" alt="" />
					<div>
						<h1>CrossShare</h1>
						<p class="subtitle" data-i18n="subtitle">
							跨设备内容分享
						</p>
					</div>
				</a>
				<div class="header-actions">
					<button
						class="icon-btn"
						id="langToggle"
						title="Switch to English"
					>
						EN
					</button>
					<button
						class="icon-btn"
						id="themeToggle"
						data-i18n-title="toggleTheme"
						title="切换主题"
					>
						☾
					</button>
					<button
						class="icon-btn"
						id="settingsToggle"
						data-i18n-title="settings"
						title="设置"
					>
						⚙
					</button>
				</div>
			</header>

			<div id="settingsPanel" class="settings hidden">
				<label>
					<span>Server URL</span>
					<input
						type="text"
						id="serverUrl"
						placeholder="http://localhost:10431"
					/>
				</label>
				<label>
					<span data-i18n="tokenLabel">Token (可选)</span>
					<input
						type="password"
						id="authToken"
						placeholder="JWT token"
					/>
				</label>
				<div class="settings-actions">
					<button
						class="btn btn-sm"
						id="saveSettings"
						data-i18n="save"
					>
						保存
					</button>
					<button
						class="btn btn-sm btn-ghost"
						id="healthCheck"
						data-i18n="checkConn"
					>
						检查连接
					</button>
					<span id="healthStatus"></span>
				</div>
			</div>

			<main class="radar-stage radar-push">
				<div class="radar-rings" aria-hidden="true"></div>

				<nav class="tabs">
					<button class="tab active" data-tab="push" data-i18n="push">
						推送
					</button>
					<button class="tab" data-tab="pull" data-i18n="pull">
						拉取
					</button>
				</nav>

				<section id="pushTab" class="tab-content active">
					<div class="mode-switch">
						<button
							class="mode active"
							data-mode="text"
							data-i18n="text"
						>
							文本
						</button>
						<button class="mode" data-mode="file" data-i18n="file">
							文件
						</button>
					</div>

					<div class="share-orb">
						<div id="textMode" class="orb-content">
							<label class="orb-label" for="pushText" data-i18n="textContent">
								文本内容
							</label>
							<textarea
								id="pushText"
								data-i18n-placeholder="pushPlaceholder"
								placeholder="输入要分享的文本内容…"
								rows="5"
							></textarea>
						</div>

						<div id="fileMode" class="orb-content hidden">
							<div class="drop-zone" id="dropZone">
								<span class="drop-icon" aria-hidden="true">
									<svg
										class="drop-icon-upload"
										viewBox="0 0 24 24"
										fill="none"
									>
										<path d="M12 16V5" />
										<path d="M8 9l4-4 4 4" />
										<path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" />
									</svg>
									<svg
										class="drop-icon-ready"
										viewBox="0 0 24 24"
										fill="none"
									>
										<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
										<path d="M14 3v5h5" />
										<path d="M9 14l2 2 4-4" />
									</svg>
								</span>
								<p id="dropTitle" data-i18n="dropHint">选择文件</p>
								<span
									id="dropSubtitle"
									class="drop-subtitle"
									data-i18n="dropSubHint"
								>
									或拖拽到此处
								</span>
								<input type="file" id="fileInput" />
							</div>
						</div>
					</div>

					<div id="fileInfo" class="file-info hidden"></div>

					<div class="action-dock">
						<div class="transfer-switch">
							<button
								class="transfer active"
								data-transfer="smart"
								data-i18n="smartTransfer"
							>
								直连优先
							</button>
							<button
								class="transfer"
								data-transfer="server"
								data-i18n="serverTransfer"
							>
								服务器暂存
							</button>
						</div>

						<button
							class="btn btn-primary btn-block"
							id="pushBtn"
							data-i18n="push"
						>
							推送
						</button>

						<details class="push-more">
							<summary data-i18n="moreSettings">更多设置</summary>
							<div class="options-row">
								<label class="inline">
									<span>TTL</span>
									<input
										type="number"
										id="pushTtl"
										data-i18n-placeholder="defaultPlaceholder"
										placeholder="默认"
										min="1"
									/>
									<span class="unit" data-i18n="seconds">秒</span>
								</label>
							</div>
						</details>
					</div>

					<div id="pushResult" class="result hidden">
						<div class="result-key">
							<span id="resultKey"></span>
							<div class="result-key-actions">
								<button
									class="btn btn-sm"
									id="copyKey"
									data-i18n="copy"
								>
									复制
								</button>
								<button
									class="btn btn-sm"
									id="copyLink"
									data-i18n="copyLink"
								>
									复制链接
								</button>
								<button
									class="btn btn-sm"
									id="showQr"
									data-i18n="showQr"
								>
									查看二维码
								</button>
								<button
									class="btn btn-sm btn-ghost hidden"
									id="cleanupServerPush"
									data-i18n="cleanup"
								>
									清理
								</button>
								<button
									class="btn btn-sm hidden"
									id="saveToServer"
									data-i18n="saveToServer"
								>
									存到服务器
								</button>
								<button
									class="btn btn-sm btn-ghost hidden"
									id="cancelP2p"
									data-i18n="cancel"
								>
									取消
								</button>
							</div>
						</div>
						<div class="result-meta" id="resultMeta"></div>
					</div>
				</section>

				<section id="pullTab" class="tab-content">
					<div class="pull-orb">
						<label class="orb-label" for="pullKey" data-i18n="enterKey">
							输入 Key
						</label>
						<div class="pull-input">
							<input
								type="text"
								id="pullKey"
								data-i18n-placeholder="enterKey"
								placeholder="输入 Key"
							/>
							<button
								class="btn btn-primary"
								id="pullBtn"
								data-i18n="pull"
							>
								拉取
							</button>
						</div>
					</div>

					<details class="pull-more">
						<summary data-i18n="moreActions">更多操作</summary>
						<div class="pull-actions">
							<label class="checkbox">
								<input type="checkbox" id="deleteAfterPull" />
								<span data-i18n="deleteAfterPull">拉取后删除</span>
							</label>
							<button
								class="btn btn-ghost"
								id="clearPull"
								data-i18n="clear"
							>
								清除
							</button>
						</div>

						<div class="delete-section">
							<div class="pull-input">
								<input
									type="text"
									id="deleteKey"
									data-i18n-placeholder="enterKey"
									placeholder="输入 Key"
								/>
								<button
									class="btn btn-danger"
									id="deleteBtn"
									data-i18n="delete"
								>
									删除
								</button>
							</div>
							<div id="deleteResult" class="result hidden">
								<div class="result-meta" id="deleteMeta"></div>
							</div>
						</div>
					</details>

					<div id="pullResult" class="result hidden">
						<div id="pullTextResult" class="hidden">
							<div class="pull-text-header">
								<span class="pull-label" data-i18n="textContent"
									>文本内容</span
								>
								<button
									class="btn btn-sm"
									id="copyText"
									data-i18n="copy"
								>
									复制
								</button>
							</div>
							<pre id="pullTextContent"></pre>
						</div>
						<div id="pullFileResult" class="hidden">
							<div class="file-download">
								<span id="pullFileName"></span>
								<a
									id="pullFileLink"
									class="btn btn-sm"
									data-i18n="download"
									>下载</a
								>
							</div>
						</div>
						<div class="result-meta" id="pullMeta"></div>
					</div>
				</section>

				<footer class="app-footer">
					<img src="/favicon.svg" alt="" />
					<p data-i18n="subtitle">跨设备内容分享</p>
				</footer>
			</main>

			<div id="toast" class="toast hidden"></div>
		</div>

		<div id="qrModal" class="modal hidden" role="dialog" aria-modal="true">
			<div class="modal-backdrop" id="qrModalBackdrop"></div>
			<div class="modal-panel">
				<div class="modal-header">
					<h2 data-i18n="shareQr">分享二维码</h2>
					<button
						class="icon-btn"
						id="closeQr"
						data-i18n-title="close"
						title="关闭"
					>
						&times;
					</button>
				</div>
				<div class="qr-box">
					<canvas id="qrCanvas" width="300" height="300"></canvas>
				</div>
				<div class="qr-link" id="qrLink"></div>
			</div>
		</div>

		<script src="qrcode-lite.js"></script>
		<script src="app.js"></script>
	</body>
</html>
