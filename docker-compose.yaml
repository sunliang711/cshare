services:
  server:
    build:
      context: crossshare-server
    ports:
      - "10431:10431"
    environment:
      - CS_STORAGE_TYPE=redis
      - CS_REDIS_ADDR=redis:6379
      - CS_RATELIMIT_REQUESTS_PER_MINUTE=10
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
